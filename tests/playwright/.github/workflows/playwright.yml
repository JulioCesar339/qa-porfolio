name: QA Automation Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start API and Database with Docker Compose
        run: |
          docker compose up --build -d
          sleep 15

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: |
          cd tests/playwright
          npm ci

      - name: Install Playwright browsers
        run: |
          cd tests/playwright
          npx playwright install chromium --with-deps

      - name: Run tests
        run: |
          cd tests/playwright
          npx playwright test

      # Sube el reporte como artifact descargable
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: tests/playwright/playwright-report/
          retention-days: 30

      # Prepara el reporte para GitHub Pages
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        if: ${{ !cancelled() }}
        with:
          path: tests/playwright/playwright-report/

      - name: Stop containers
        if: always()
        run: docker compose down

  # Job separado para publicar en GitHub Pages
  deploy-report:
    needs: test # Espera a que terminen los tests
    runs-on: ubuntu-latest
    if: ${{ !cancelled() }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }} # URL del reporte publicado

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
