services:
  db:
    image: postgres:16
    container_name: qa-portfolio-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: qaportfolio
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./src/Api
      dockerfile: Dockerfile
    container_name: qa-portfolio-api
    ports:
      - "5023:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=qaportfolio;Username=postgres;Password=postgres
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
